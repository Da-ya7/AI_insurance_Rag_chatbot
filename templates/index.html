<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Insurance AI Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,500;8..60,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="shell">

    <aside class="rail">
      <div class="rail-brand">
        <div class="brand-text">
          <span class="brand-title">Insurance AI Assistant</span>
          <span class="brand-sub">Policy Q&amp;A, grounded in your documents</span>
        </div>
      </div>

      <button id="new-chat" class="rail-btn rail-btn--primary" type="button">
        <span>New conversation</span>
      </button>

      <div class="rail-footer">
        <label class="upload-btn" for="doc-upload">
          <span class="upload-icon">＋</span>
          <span>Upload policy PDF</span>
        </label>
        <input id="doc-upload" type="file" accept="application/pdf" hidden />
        <p id="upload-status" class="upload-status"></p>
      </div>
    </aside>

    <main class="stage">
      <header class="stage-header">
        <div>
          <h1>Ask about your coverage</h1>
          <p class="stage-sub">Answers are drawn from the policy documents on file, with clause references you can check.</p>
        </div>
      </header>

      <div id="chat-window" class="chat-window">
        <div class="welcome">
          <p class="welcome-eyebrow">Start here</p>
          <h2>What would you like to know?</h2>
          <div class="suggestions">
            <button class="suggestion" type="button">What is term insurance?</button>
            <button class="suggestion" type="button">What's the difference between term and whole life?</button>
            <button class="suggestion" type="button">How is a premium calculated?</button>
          </div>
        </div>
      </div>

      <form id="chat-form" class="composer">
        <input id="question" type="text" placeholder="Ask about your policy..." autocomplete="off" required />
        <button type="submit" class="send-btn" aria-label="Send">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 8h11M8 2l6 6-6 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </form>
    </main>

  </div>
  <script src="/static/app.js"></script>
</body>
</html>
